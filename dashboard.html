<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LE-EASE – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- NAVIGATION BAR -->
<header class="navbar">
  <div class="logo">LE-EASE</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="vehicles.html">Vehicles</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="admin.html">Add Vehicle</a>
  </nav>
  <div class="auth"></div>
</header>

<!-- PAGE HEADER -->
<section class="page-header">
  <span class="tag">YOUR DASHBOARD</span>
  <h1>Your Bookings</h1>
</section>

<section class="dashboard-list" id="bookings-list"></section>

<footer class="footer">
  <div>LE-EASE</div>
  <div>© 2026 LE-EASE. All Rights Reserved.</div>
</footer>

<!-- HIDDEN LOGIN  AND SIGNUPMODAL -->
<div id="auth-modal" class="modal hidden">
  <div class="modal-content">
    <button id="close-modal" class="close" type="button">&times;</button>

    <form id="login-form" class="auth-form">
      <h2>Login</h2>
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required />
      <button type="submit" class="btn primary full">Login</button>
      <p class="auth-switch">New user? <a href="#" id="show-signup-link">Sign up here</a></p>
    </form>

    <form id="signup-form" class="auth-form hidden">
      <h2>Sign Up</h2>
      <label for="signup-name">Name</label>
      <input type="text" id="signup-name" placeholder="Your Name" required />
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com" required />
      <button type="submit" class="btn primary full">Sign Up</button>
      <p class="auth-switch">Already have an account? <a href="#" id="show-login-link">Login here</a></p>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
